<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Fatima Haider Naqvi</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .contact-card { max-width: 560px; margin: 0 auto; }
    .contact-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .contact-row:last-child { border-bottom: none; }
    .contact-icon {
      width: 42px;
      height: 42px;
      background: rgba(222, 83, 73, 0.2);
      border: 1px solid rgba(222, 83, 73, 0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      color: #f7a09b;
      flex-shrink: 0;
    }
    .contact-detail { line-height: 1.4; }
    .contact-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1.2px; color: rgba(255,255,255,0.45); }
    .contact-value a { color: white; text-decoration: none; transition: color 0.2s; }
    .contact-value a:hover { color: #de5349; }
    .back-link { display: inline-flex; align-items: center; gap: 0.4rem; color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.9rem; margin-bottom: 1rem; transition: color 0.2s; }
    .back-link:hover { color: #de5349; }
  </style>
</head>
<body>
  <video autoplay muted loop id="bg-video">
    <source src="src.mp4" type="video/mp4">
  </video>

  <div class="container" style="margin-top: 80px; gap: 0;">
    <div class="card contact-card reveal visible">
      <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
      <h2><i class="fas fa-paper-plane section-icon"></i> Get In Touch</h2>
      <p style="text-align:center; color:rgba(255,255,255,0.65); margin-bottom:1.8rem; font-size:0.95rem;">
        I'm always open to new opportunities and conversations. Feel free to reach out!
      </p>

      <div class="contact-row">
        <div class="contact-icon"><i class="fas fa-envelope"></i></div>
        <div class="contact-detail">
          <div class="contact-label">Email</div>
          <div class="contact-value"><a href="mailto:hnaqvifatima@gmail.com">hnaqvifatima@gmail.com</a></div>
        </div>
      </div>

      <div class="contact-row">
        <div class="contact-icon"><i class="fab fa-linkedin"></i></div>
        <div class="contact-detail">
          <div class="contact-label">LinkedIn</div>
          <div class="contact-value"><a href="https://www.linkedin.com/in/fatima-haider-naqvi-44529b214" target="_blank">fatima-haider-naqvi</a></div>
        </div>
      </div>

      <div class="contact-row">
        <div class="contact-icon"><i class="fab fa-github"></i></div>
        <div class="contact-detail">
          <div class="contact-label">GitHub</div>
          <div class="contact-value"><a href="https://github.com/FatimaHNaqvi" target="_blank">FatimaHNaqvi</a></div>
        </div>
      </div>

    </div>
  </div>

  <div class="side-icons">
    <a href="mailto:hnaqvifatima@gmail.com" title="Email"><i class="fas fa-envelope"></i></a>
    <a href="https://github.com/FatimaHNaqvi" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
    <a href="https://www.linkedin.com/in/fatima-haider-naqvi-44529b214" target="_blank" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
  </div>
</body>
</html>
